<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廖千儀 ♥ 陳郁諠 婚禮籌備計畫</title>
<style>
:root{
  --pink:#C9506E;--pink-l:#FFD6E0;--pink-p:#FFF0F5;
  --blue:#3A6EA5;--blue-l:#D6E8FF;--blue-p:#EEF6FF;
  --purple:#6A4C93;--purple-l:#E8D6FF;
  --dark:#4A1942;--green:#28a745;--green-l:#D4EDDA;
  --red:#dc3545;--red-l:#FFCDD2;
  --yellow:#FFF9C4;--orange:#FF9800;--orange-l:#FFE0B2;
  --gray:#6c757d;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#fce4ec 0%,#f3e5f5 50%,#e8eaf6 100%);min-height:100vh;color:#333;}

/* Hero */
.hero{background:linear-gradient(135deg,var(--dark) 0%,#6A4C93 60%,var(--pink) 100%);color:#fff;text-align:center;padding:2rem 1rem 1.5rem;position:relative;overflow:hidden;}
.hero::before{content:"✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿ ✿";position:absolute;top:6px;left:0;right:0;font-size:13px;opacity:.25;letter-spacing:4px;}
.hero h1{font-size:1.9rem;font-weight:700;margin-bottom:.4rem;}
.hero p{font-size:.9rem;opacity:.85;}

/* Settings bar */
.settings-bar{background:#fff;border-bottom:3px solid var(--pink);padding:.8rem 1.2rem;display:flex;gap:1.2rem;align-items:center;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.settings-bar label{font-weight:700;font-size:.9rem;color:var(--dark);}
.settings-bar input[type=date]{padding:.35rem .6rem;border:2px solid var(--pink);border-radius:8px;font-size:.9rem;cursor:pointer;font-family:inherit;}
.today-badge{background:var(--blue-p);color:var(--blue);padding:.3rem .8rem;border-radius:20px;font-size:.85rem;font-weight:600;border:1px solid var(--blue-l);}
.stat-badge{padding:.3rem .8rem;border-radius:20px;font-size:.85rem;font-weight:700;cursor:pointer;}
.stat-overdue{background:var(--red-l);color:var(--red);border:1px solid #ef9a9a;}
.stat-soon{background:var(--orange-l);color:var(--orange);border:1px solid #ffcc80;}
.stat-ok{background:var(--green-l);color:var(--green);border:1px solid #a5d6a7;}
.days-to-wedding{background:var(--purple-l);color:var(--purple);border:1px solid #ce93d8;padding:.3rem .8rem;border-radius:20px;font-size:.85rem;font-weight:700;}

/* Progress */
.progress-section{background:#fff;margin:.8rem;border-radius:12px;padding:1rem 1.4rem;box-shadow:0 2px 10px rgba(0,0,0,.09);}
.progress-label{display:flex;justify-content:space-between;margin-bottom:.4rem;font-weight:600;color:var(--dark);font-size:.9rem;}
.progress-bar{height:20px;background:#f0f0f0;border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--purple),var(--pink));transition:width .5s;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.78rem;font-weight:700;min-width:30px;}

/* Tabs */
.tabs{display:flex;gap:.4rem;padding:0 .8rem;flex-wrap:wrap;}
.tab-btn{padding:.55rem 1.1rem;border:none;border-radius:8px 8px 0 0;cursor:pointer;font-size:.88rem;font-weight:600;background:rgba(255,255,255,.6);color:var(--dark);transition:all .2s;}
.tab-btn.active{background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,.08);}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.85);}

/* Tab content */
.tab-content{display:none;padding:0 .8rem 2rem;}
.tab-content.active{display:block;}

/* ── GANTT ── */
.gantt-wrap{background:#fff;border-radius:0 12px 12px 12px;padding:1.1rem;overflow-x:auto;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.gantt-info{background:var(--yellow);border-left:4px solid #f9a825;padding:.6rem 1rem;border-radius:4px;margin-bottom:.9rem;font-size:.85rem;color:#5d4037;}
.legend{display:flex;gap:.9rem;flex-wrap:wrap;font-size:.82rem;align-items:center;margin-bottom:.9rem;}
.legend-item{display:flex;align-items:center;gap:.3rem;}
.leg-dot{width:16px;height:16px;border-radius:3px;}
table.gantt{border-collapse:collapse;width:100%;min-width:880px;font-size:.8rem;}
table.gantt th{background:var(--dark);color:#fff;padding:.45rem .35rem;text-align:center;white-space:nowrap;font-weight:700;font-size:.78rem;}
table.gantt td{border:1px solid #e0e0e0;padding:.3rem .3rem;vertical-align:middle;}
table.gantt tr:hover td{filter:brightness(.96);}
.g-cat{font-weight:700;font-size:.76rem;text-align:center;}
.g-task{font-size:.82rem;}
.g-own{text-align:center;font-weight:700;font-size:.76rem;color:#fff;border-radius:4px;padding:.1rem .25rem;white-space:nowrap;}
.o-m{background:var(--blue);}
.o-f{background:var(--pink);}
.o-b{background:var(--purple);}
.g-bar{text-align:center;font-size:.85rem;transition:background .3s;}
/* bar colors */
.bar-m{background:#bcd4f0;}
.bar-f{background:#f5b8cc;}
.bar-b{background:#c9b8e8;}
.bar-done{background:#aedca0;}
.bar-wed{background:var(--pink);color:#fff;font-weight:700;}
/* column state overrides (applied via JS class) */
.col-today{background:#FFF9C4 !important;outline:2px solid #f9a825;outline-offset:-2px;}
.col-wed{background:#FFCDD2 !important;outline:2px solid var(--pink);outline-offset:-2px;}
.col-past{opacity:.55;}
.th-today{background:#f9a825 !important;position:relative;}
.th-wed{background:var(--pink) !important;}
.th-past{background:#888 !important;}

/* ── CHECKLIST ── */
.cl-wrap{background:#fff;border-radius:0 12px 12px 12px;box-shadow:0 2px 12px rgba(0,0,0,.1);overflow:hidden;}
.cl-toolbar{padding:.8rem 1.1rem;background:#fafafa;border-bottom:1px solid #eee;display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;}
.cl-toolbar input{padding:.4rem .8rem;border:1px solid #ddd;border-radius:8px;font-size:.88rem;width:200px;}
.filter-wrap{display:flex;gap:.4rem;flex-wrap:wrap;}
.fbtn{padding:.3rem .7rem;border:2px solid #ddd;border-radius:16px;cursor:pointer;font-size:.8rem;background:#fff;font-weight:600;transition:all .2s;}
.fbtn.a-all{border-color:var(--dark);background:var(--dark);color:#fff;}
.fbtn.a-m{border-color:var(--blue);background:var(--blue);color:#fff;}
.fbtn.a-f{border-color:var(--pink);background:var(--pink);color:#fff;}
.fbtn.a-b{border-color:var(--purple);background:var(--purple);color:#fff;}
.fbtn.a-over{border-color:var(--red);background:var(--red);color:#fff;}
.fbtn.a-soon{border-color:var(--orange);background:var(--orange);color:#fff;}
.fbtn:hover:not([class*='a-']){background:#f0f0f0;}
.cl-sec-hdr{padding:.55rem 1.1rem;font-weight:700;font-size:.88rem;color:#fff;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.cl-sec-hdr:hover{filter:brightness(.93);}
.cl-item{display:flex;align-items:flex-start;gap:.75rem;padding:.7rem 1.1rem;border-bottom:1px solid #f0f0f0;transition:background .12s;}
.cl-item:hover{background:#fafafa;}
.cl-item.is-done{opacity:.5;}
.cl-item.is-done .cl-task{text-decoration:line-through;color:var(--gray);}
.cl-item.is-overdue{background:#fff5f5;}
.cl-item.is-soon{background:#fffde7;}
.cl-chk{flex-shrink:0;width:22px;height:22px;border:2px solid #ccc;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:2px;background:#fff;}
.cl-chk.checked{background:var(--green);border-color:var(--green);}
.cl-chk.checked::after{content:"✓";color:#fff;font-size:14px;font-weight:700;}
.cl-body{flex:1;}
.cl-task{font-size:.88rem;font-weight:500;margin-bottom:.2rem;line-height:1.4;}
.cl-meta{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;font-size:.76rem;}
.badge{padding:.08rem .45rem;border-radius:10px;font-weight:600;}
.badge-m{background:var(--blue-l);color:var(--blue);}
.badge-f{background:var(--pink-l);color:var(--pink);}
.badge-b{background:var(--purple-l);color:var(--purple);}
.status-badge{padding:.08rem .5rem;border-radius:10px;font-weight:700;font-size:.75rem;}
.st-over{background:var(--red-l);color:var(--red);}
.st-soon{background:var(--orange-l);color:var(--orange);}
.st-ok{background:var(--green-l);color:var(--green);}
.st-done{background:#e8e8e8;color:#666;}
.st-none{display:none;}
.dl-text{color:var(--gray);}
.dl-text.dl-over{color:var(--red);font-weight:600;}
.dl-text.dl-soon{color:var(--orange);font-weight:600;}
.budget-tag{font-size:.74rem;color:#888;background:#f5f5f5;padding:.08rem .4rem;border-radius:4px;}
.cl-note{font-size:.78rem;color:#666;margin-top:.25rem;line-height:1.4;font-style:italic;}
.cl-item.hidden{display:none;}

/* ── TIMELINE ── */
.tl-wrap{background:#fff;border-radius:0 12px 12px 12px;padding:1.2rem;box-shadow:0 2px 12px rgba(0,0,0,.1);}
.timeline{position:relative;padding-left:2rem;}
.timeline::before{content:"";position:absolute;left:.72rem;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--purple),var(--pink));}
.tl-item{position:relative;margin-bottom:1.4rem;}
.tl-dot{position:absolute;left:-1.5rem;top:.3rem;width:13px;height:13px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px var(--purple);background:var(--purple);}
.tl-dot.d-done{background:var(--green);box-shadow:0 0 0 2px var(--green);}
.tl-dot.d-current{background:var(--orange);box-shadow:0 0 0 2px var(--orange);width:16px;height:16px;left:-1.65rem;}
.tl-dot.d-wed{background:var(--pink);box-shadow:0 0 0 2px var(--pink);width:16px;height:16px;left:-1.65rem;}
.tl-month{font-weight:700;font-size:.83rem;display:inline-flex;align-items:center;gap:.4rem;padding:.2rem .7rem;border-radius:10px;margin-bottom:.4rem;}
.tl-tasks{list-style:none;}
.tl-tasks li{font-size:.86rem;padding:.28rem 0;border-bottom:1px dashed #eee;display:flex;gap:.4rem;align-items:flex-start;line-height:1.4;}
.tl-tasks li:last-child{border-bottom:none;}
.tl-tag{flex-shrink:0;font-size:.7rem;font-weight:700;padding:.04rem .35rem;border-radius:7px;margin-top:2px;}

/* ── SPECIFIC ── */
.spec-hdr{color:#fff;padding:.75rem 1.1rem;font-weight:700;font-size:.95rem;}

@media(max-width:600px){
  .hero h1{font-size:1.4rem;}
  .tab-btn{padding:.45rem .7rem;font-size:.8rem;}
  .settings-bar{gap:.7rem;}
}
</style>
</head>
<body>

<div class="hero">
  <h1>💍 廖千儀 ♥ 陳郁諠</h1>
  <p>結婚籌備計畫｜台灣習俗（簡化版，僅結婚宴）</p>
</div>

<div class="settings-bar">
  <label for="wedding-input">💒 婚禮日期：</label>
  <input type="date" id="wedding-input" value="2026-12-06">
  <span class="today-badge" id="today-display"></span>
  <span class="days-to-wedding" id="days-countdown"></span>
  <span class="stat-badge stat-overdue" id="badge-over" style="cursor:pointer" onclick="setFilter('over')">⚠️ 逾期 <span id="cnt-over">0</span> 項</span>
  <span class="stat-badge stat-soon" id="badge-soon" style="cursor:pointer" onclick="setFilter('soon')">🕐 即將到期 <span id="cnt-soon">0</span> 項</span>
  <span class="stat-badge stat-ok" id="badge-ok">✅ 正常 <span id="cnt-ok">0</span> 項</span>
</div>

<div class="progress-section">
  <div class="progress-label">
    <span>整體進度</span>
    <span id="prog-text">0 / 0 完成</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%">0%</div></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('checklist',this)">✅ 完整 Checklist</button>
  <button class="tab-btn" onclick="switchTab('gantt',this)">📅 甘特圖</button>
  <button class="tab-btn" onclick="switchTab('timeline',this)">🗓️ 時間軸</button>
  <button class="tab-btn" onclick="switchTab('male',this)">💙 男方清單</button>
  <button class="tab-btn" onclick="switchTab('female',this)">🌸 女方清單</button>
</div>

<!-- ── CHECKLIST ── -->
<div id="tab-checklist" class="tab-content active">
<div class="cl-wrap">
  <div class="cl-toolbar">
    <input type="text" id="search-q" placeholder="🔍 搜尋..." oninput="applyFilters()">
    <div class="filter-wrap">
      <button class="fbtn a-all" id="f-all" onclick="setFilter('all')">全部</button>
      <button class="fbtn" id="f-m" onclick="setFilter('m')">💙 男方</button>
      <button class="fbtn" id="f-f" onclick="setFilter('f')">🌸 女方</button>
      <button class="fbtn" id="f-b" onclick="setFilter('b')">💜 雙方</button>
      <button class="fbtn" id="f-over" onclick="setFilter('over')">🔴 逾期</button>
      <button class="fbtn" id="f-soon" onclick="setFilter('soon')">🟡 即將</button>
    </div>
    <label style="font-size:.82rem"><input type="checkbox" id="hide-done" onchange="applyFilters()"> 隱藏完成</label>
  </div>
  <div id="cl-body"></div>
</div>
</div>

<!-- ── GANTT ── -->
<div id="tab-gantt" class="tab-content">
<div class="gantt-wrap">
  <div class="gantt-info" id="gantt-info"></div>
  <div class="legend">
    <strong>圖例：</strong>
    <span class="legend-item"><span class="leg-dot" style="background:#bcd4f0"></span>男方</span>
    <span class="legend-item"><span class="leg-dot" style="background:#f5b8cc"></span>女方</span>
    <span class="legend-item"><span class="leg-dot" style="background:#c9b8e8"></span>雙方共同</span>
    <span class="legend-item"><span class="leg-dot" style="background:#aedca0"></span>已完成</span>
    <span class="legend-item"><span class="leg-dot" style="background:var(--pink)"></span>婚禮當天</span>
    <span class="legend-item"><span class="leg-dot" style="background:#FFF9C4;border:2px solid #f9a825"></span>今日</span>
    <span class="legend-item"><span class="leg-dot" style="background:#FFCDD2;border:2px solid var(--pink)"></span>婚禮月</span>
  </div>
  <div style="overflow-x:auto"><table class="gantt" id="g-table"><thead id="g-head"></thead><tbody id="g-body"></tbody></table></div>
</div>
</div>

<!-- ── TIMELINE ── -->
<div id="tab-timeline" class="tab-content">
<div class="tl-wrap">
  <div class="timeline" id="tl-body"></div>
</div>
</div>

<!-- ── MALE ── -->
<div id="tab-male" class="tab-content">
<div class="cl-wrap">
  <div class="spec-hdr" style="background:var(--blue)">💙 廖千儀（男方）專屬清單 <span style="font-size:.82rem;font-weight:400;opacity:.85">— 雙方共同事項請至「完整 Checklist」查看</span></div>
  <div id="male-body"></div>
</div>
</div>

<!-- ── FEMALE ── -->
<div id="tab-female" class="tab-content">
<div class="cl-wrap">
  <div class="spec-hdr" style="background:var(--pink)">🌸 陳郁諠（女方）專屬清單 <span style="font-size:.82rem;font-weight:400;opacity:.85">— 雙方共同事項請至「完整 Checklist」查看</span></div>
  <div id="female-body"></div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
// owner: 'm'=男方, 'f'=女方, 'b'=雙方
// deadlineOffset: null=固定日期, 數字=相對婚禮天數(負=前,正=後)
// fixedDate: 'YYYY-MM-DD' for fixed, null for relative
// done: true if already completed

const CL = [
  {cat:"確認規劃",task:"求婚完成 ✓",owner:"b",fixedDate:"2026-04-17",deadlineOffset:null,note:"廖千儀已於04/17完成求婚！",budget:"",done:true},
  {cat:"確認規劃",task:"雙方家長見面面談",owner:"b",fixedDate:"2026-05-30",deadlineOffset:null,note:"確認雙方對婚禮的期望與形式",budget:""},
  {cat:"確認規劃",task:"確定婚禮日期（查農民曆/擇日師）",owner:"b",fixedDate:"2026-06-30",deadlineOffset:null,note:"台灣重視吉日，可請擇日師選擇良辰吉日",budget:"擇日師約NT$2,000-5,000"},
  {cat:"確認規劃",task:"確認婚禮總預算與分攤方式",owner:"b",fixedDate:"2026-06-30",deadlineOffset:null,note:"台灣傳統男方負擔婚宴較多，現代多依雙方協議彈性分攤",budget:""},
  {cat:"確認規劃",task:"確認賓客名單初稿（男女方各自統計）",owner:"b",fixedDate:"2026-06-30",deadlineOffset:null,note:"依場地容量決定桌數，台灣喜宴通常10人/桌",budget:""},
  {cat:"確認規劃",task:"確定婚宴形式（飯店/餐廳/流水席）",owner:"b",fixedDate:"2026-06-30",deadlineOffset:null,note:"飯店較正式，餐廳較輕鬆，流水席適合鄉村大家族",budget:""},
  {cat:"預訂服務",task:"預訂婚宴場地 ⚡",owner:"b",fixedDate:"2026-07-31",deadlineOffset:null,note:"熱門場地需提前6-12個月預訂，選完日期後立即預訂！",budget:"約NT$1,000-3,000/桌"},
  {cat:"預訂服務",task:"預訂婚紗工作室（含拍婚紗照）",owner:"b",fixedDate:"2026-07-31",deadlineOffset:null,note:"建議比較3-5家婚紗工作室，看過作品集再決定",budget:"套裝約NT$30,000-100,000+"},
  {cat:"預訂服務",task:"預訂婚禮攝影師",owner:"b",fixedDate:"2026-08-31",deadlineOffset:null,note:"熱門攝影師需提前半年以上預訂",budget:"約NT$25,000-80,000"},
  {cat:"預訂服務",task:"預訂婚禮錄影（選配）",owner:"b",fixedDate:"2026-08-31",deadlineOffset:null,note:"可錄製完整婚禮或只拍精華影片",budget:"約NT$15,000-50,000"},
  {cat:"預訂服務",task:"預訂新娘秘書（新秘）⚡",owner:"f",fixedDate:"2026-08-31",deadlineOffset:null,note:"好的新秘非常搶手，務必提早預訂！",budget:"約NT$10,000-25,000"},
  {cat:"預訂服務",task:"確定婚禮主持人",owner:"b",fixedDate:"2026-08-31",deadlineOffset:null,note:"可請熟識友人或聘請專業婚禮主持人",budget:"專業主持約NT$8,000-20,000"},
  {cat:"預訂服務",task:"規劃蜜月行程",owner:"b",fixedDate:"2026-09-30",deadlineOffset:null,note:"早鳥訂票，機票住宿越早越便宜",budget:"依目的地"},
  {cat:"法律文件",task:"準備結婚登記所需文件",owner:"b",fixedDate:null,deadlineOffset:-30,note:"需準備：戶口名簿正本、身分證、印章、2位證人及其身分證",budget:"免費"},
  {cat:"法律文件",task:"辦理結婚登記（戶政事務所）",owner:"b",fixedDate:null,deadlineOffset:0,note:"台灣結婚登記為重要法律程序，勿遺忘！",budget:"免費"},
  {cat:"男方準備",task:"確認聘金金額（與雙方家長商議）",owner:"m",fixedDate:"2026-07-31",deadlineOffset:null,note:"台灣傳統習俗，男方給女方大聘，金額依雙方協議",budget:"通常NT$60,000-200,000+"},
  {cat:"男方準備",task:"準備聘禮（禮餅、糖果、罐頭等六禮）",owner:"m",fixedDate:null,deadlineOffset:-60,note:"台灣傳統六禮，禮餅用於女方分送親友告知喜訊",budget:"NT$10,000-30,000"},

const BASE_Y=2026, BASE_M=5;
function monthIdx(y,m){return (y-BASE_Y)*12+(m-BASE_M);}
function idxToDate(idx){
  const totalM = BASE_M-1+idx;
  return new Date(BASE_Y+Math.floor(totalM/12), totalM%12, 1);
}

// ═══════════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════════
function getWeddingDate(){
  const v=document.getElementById('wedding-input').value;
  const [y,m,d]=v.split('-').map(Number);
  return new Date(y,m-1,d);
}
function getDeadlineDate(item,weddingDate){
  if(item.deadlineOffset!==null){
    const d=new Date(weddingDate);
    d.setDate(d.getDate()+item.deadlineOffset);
    return d;
  } else if(item.fixedDate){
    const [y,m,d]=item.fixedDate.split('-').map(Number);
    return new Date(y,m-1,d);
  }
  return null;
}
function getStatus(item,i,keyPrefix,weddingDate){
  const key=keyPrefix+i;
  if(st[key]) return 'done';
  const d=getDeadlineDate(item,weddingDate);
  if(!d) return 'none';
  const today=new Date(); today.setHours(0,0,0,0);
  const dl=new Date(d); dl.setHours(0,0,0,0);
  const diff=(dl-today)/(1000*60*60*24);
  if(diff<0) return 'over';
  if(diff<=30) return 'soon';
  return 'ok';
}
function fmtDate(d){
  if(!d) return '';
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function daysLeft(d){
  const today=new Date(); today.setHours(0,0,0,0);
  const dl=new Date(d); dl.setHours(0,0,0,0);
  return Math.ceil((dl-today)/(1000*60*60*24));
}

function updateSettingsBar(){
  const today=new Date();
  document.getElementById('today-display').textContent=`今日：${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;
  const wd=getWeddingDate();
  const diff=Math.ceil((wd-today)/(1000*60*60*24));
  if(diff>0) document.getElementById('days-countdown').textContent=`距婚禮還有 ${diff} 天`;
  else if(diff===0) document.getElementById('days-countdown').textContent='今天是婚禮日！🎊';
  else document.getElementById('days-countdown').textContent=`婚禮已過 ${-diff} 天`;

  let over=0,soon=0,ok=0;
  CL.forEach((item,i)=>{
    const s=getStatus(item,i,'cl',wd);
    if(s==='over') over++;
    else if(s==='soon') soon++;
    else if(s==='ok') ok++;
  });
  document.getElementById('cnt-over').textContent=over;
  document.getElementById('cnt-soon').textContent=soon;
  document.getElementById('cnt-ok').textContent=ok;
}

function ownerBadge(o){
  if(o==='m') return '<span class="badge badge-m">💙 男方</span>';
  if(o==='f') return '<span class="badge badge-f">🌸 女方</span>';
  return '<span class="badge badge-b">💜 雙方</span>';
}

function renderCL(){
  const wd=getWeddingDate();
  const container=document.getElementById('cl-body');
  let html='';
  let prevCat='';
  CL.forEach((item,i)=>{
    const st_val=getStatus(item,i,'cl',wd);
    const isDone=st_val==='done';
    const dl=getDeadlineDate(item,wd);
    const dlStr=dl?fmtDate(dl):'';
    const dlClass=st_val==='over'?'dl-over':st_val==='soon'?'dl-soon':'';
    const stBadge=st_val==='done'?'<span class="status-badge st-done">✅ 完成</span>':
      st_val==='over'?'<span class="status-badge st-over">🔴 逾期</span>':
      st_val==='soon'?`<span class="status-badge st-soon">🟡 ${daysLeft(dl)}天後</span>`:
      st_val==='ok'?'<span class="status-badge st-ok">🟢 正常</span>':'';

    if(item.cat!==prevCat){
      if(prevCat) html+='</div>';
      const c=CAT_COLOR[item.cat]||'#555';
      html+=`<div class="cl-sec-hdr" style="background:${c}" onclick="toggleSec(this)"><span>${item.cat}</span><span>▼</span></div><div class="cl-sec-body">`;
      prevCat=item.cat;
    }
    const itemClass=`cl-item ${isDone?'is-done':''} ${st_val==='over'?'is-overdue':st_val==='soon'?'is-soon':''} owner-${item.owner}`;
    html+=`<div class="${itemClass}" id="cli-${i}">
      <div class="cl-chk ${isDone?'checked':''}" onclick="toggleCL(${i})"></div>
      <div class="cl-body">
        <div class="cl-task">${item.task}</div>
        <div class="cl-meta">
          ${ownerBadge(item.owner)}
          ${stBadge}
          ${dlStr?`<span class="dl-text ${dlClass}">📅 ${dlStr}</span>`:''}
          ${item.budget?`<span class="budget-tag">💰 ${item.budget}</span>`:''}
        </div>
        ${item.note?`<div class="cl-note">${item.note}</div>`:''}
      </div>
    </div>`;
  });
  if(prevCat) html+='</div>';
  container.innerHTML=html;
  updateProgress();
  applyFilters();
}

function toggleSec(hdr){
  const body=hdr.nextElementSibling;
  const arrow=hdr.querySelector('span:last-child');
  if(body.style.display==='none'){body.style.display='';arrow.textContent='▼';}
  else{body.style.display='none';arrow.textContent='▶';}
}

function toggleCL(i){
  st['cl'+i]=!st['cl'+i];
  saveState();
  renderCL();
  updateSettingsBar();
}

function updateProgress(){
  const total=CL.length;
  const done=CL.filter((_,i)=>st['cl'+i]).length;
  const pct=Math.round(done/total*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-fill').textContent=pct+'%';
  document.getElementById('prog-text').textContent=`${done} / ${total} 完成`;
}

function setFilter(f){
  filterMode=f;
  const map={'all':'a-all','m':'a-m','f':'a-f','b':'a-b','over':'a-over','soon':'a-soon'};
  ['f-all','f-m','f-f','f-b','f-over','f-soon'].forEach(id=>{
    document.getElementById(id).className='fbtn';
  });
  const fid={'all':'f-all','m':'f-m','f':'f-f','b':'f-b','over':'f-over','soon':'f-soon'}[f];
  if(fid) document.getElementById(fid).className='fbtn '+map[f];
  applyFilters();
}

function applyFilters(){
  const q=(document.getElementById('search-q').value||'').toLowerCase();
  const hideDone=document.getElementById('hide-done').checked;
  const wd=getWeddingDate();
  document.querySelectorAll('#cl-body .cl-item').forEach(el=>{
    const i=parseInt(el.id.replace('cli-',''));
    const item=CL[i];
    const st_val=getStatus(item,i,'cl',wd);
    const isDone=st_val==='done';
    const taskTxt=el.querySelector('.cl-task').textContent.toLowerCase();
    const noteTxt=(el.querySelector('.cl-note')||{textContent:''}).textContent.toLowerCase();
    const matchQ=!q||taskTxt.includes(q)||noteTxt.includes(q);
    let matchOwner=true;
    if(filterMode==='m') matchOwner=item.owner==='m'||item.owner==='b';
    else if(filterMode==='f') matchOwner=item.owner==='f'||item.owner==='b';
    else if(filterMode==='b') matchOwner=item.owner==='b';
    else if(filterMode==='over') matchOwner=st_val==='over';
    else if(filterMode==='soon') matchOwner=st_val==='soon';
    const matchDone=!hideDone||!isDone;
    el.classList.toggle('hidden',!(matchQ&&matchOwner&&matchDone));
  });
}

// GANTT RENDER
// ═══════════════════════════════════════════════
function renderGantt(){
  const wd=getWeddingDate();
  const today=new Date(); today.setHours(0,0,0,0);
  const todayY=today.getFullYear(), todayM=today.getMonth()+1;
  const wedY=wd.getFullYear(), wedM=wd.getMonth()+1;

  // Helper: add n months to date
  function addMon(d,n){return new Date(d.getFullYear(),d.getMonth()+n,1);}

  // Dynamic month range: always from 2026/05; end at wedding+4 months
  const fixedStart=new Date(2026,4,1);
  const dynStart=addMon(wd,-8);
  const rangeStart=dynStart<fixedStart?dynStart:fixedStart;
  const rangeEnd=addMon(wd,4);
  const ganttMonths=[];
  let cur=new Date(rangeStart);
  while(cur<=rangeEnd){ganttMonths.push([cur.getFullYear(),cur.getMonth()+1]);cur=addMon(cur,1);}

  // Get bar start/end [year,month] for each GANTT item
  // isFixed=true: startOff/endOff are [year,month] absolute
  // isFixed=false: offsets are months relative to wedding (0=wedding month)
  function getBarRange(item){
    const [,,,startOff,endOff,,isFixed]=item;
    if(isFixed){return {sy:startOff[0],sm:startOff[1],ey:endOff[0],em:endOff[1]};}
    const sd=addMon(wd,startOff), ed=addMon(wd,endOff);
    return {sy:sd.getFullYear(),sm:sd.getMonth()+1,ey:ed.getFullYear(),em:ed.getMonth()+1};
  }

  // Info bar
  const todayLabel=`今日：${todayY}年${MONTH_ZH[today.getMonth()]}月`;
  const wedLabel=`婚禮：${wedY}年${MONTH_ZH[wd.getMonth()]}月`;
  document.getElementById('gantt-info').innerHTML=
    `📍 <strong>${todayLabel}</strong>（黃色欄）｜💒 <strong>${wedLabel}</strong>（粉紅欄）｜灰色欄 = 已過去的月份`;

  // Build header — group columns by year
  const yearCount={};
  ganttMonths.forEach(([y])=>{yearCount[y]=(yearCount[y]||0)+1;});
  let thYear=`<tr><th colspan="3" style="background:#6A4C93">▼ 月份</th>`;
  Object.entries(yearCount).forEach(([y,cnt])=>{
    thYear+=`<th colspan="${cnt}" style="background:#5A3C83;font-size:.76rem">${y}</th>`;
  });
  thYear+='</tr>';

  let thMonths=`<tr><th style="min-width:78px">類別</th><th style="min-width:170px">項目</th><th style="min-width:45px">負責</th>`;
  ganttMonths.forEach(([y,m])=>{
    const isCur=(y===todayY&&m===todayM);
    const isWed=(y===wedY&&m===wedM);
    const isPast=y<todayY||(y===todayY&&m<todayM);
    const cls=isCur?'th-today':isWed?'th-wed':isPast?'th-past':'';
    const extra=isCur?' ▼今日':'';
    thMonths+=`<th class="${cls}">${MONTH_ZH[m-1]}月${extra}</th>`;
  });
  thMonths+='</tr>';
  document.getElementById('g-head').innerHTML=thYear+thMonths;

  // Build body
  const barCls={m:'bar-m',f:'bar-f',b:'bar-b'};
  let prevCat=''; let html='';
  GANTT.forEach(item=>{
    const [cat,task,owner]=item;
    const barType=item[5]||'b';
    const {sy,sm,ey,em}=getBarRange(item);
    const isWedRow=(barType==='wed');
    const isDoneRow=(barType==='done');
    let catCell=cat!==prevCat?`<td class="g-cat" style="color:${CAT_COLOR[cat]||'#333'}">${cat}</td>`:'<td></td>';
    prevCat=cat;
    let ownCls=owner==='m'?'o-m':owner==='f'?'o-f':'o-b';
    let ownLbl=owner==='m'?'男':owner==='f'?'女':'雙';
    let cells='';
    ganttMonths.forEach(([y,m])=>{
      const isCurCol=(y===todayY&&m===todayM);
      const isWedCol=(y===wedY&&m===wedM);
      const isPast=y<todayY||(y===todayY&&m<todayM);
      // Check if this month falls within bar range
      const inBar=(y>sy||(y===sy&&m>=sm))&&(y<ey||(y===ey&&m<=em));
      if(inBar){
        const isStart=(y===sy&&m===sm), isEnd=(y===ey&&m===em);
        let bcls=isDoneRow?'bar-done':isWedRow?'bar-wed':barCls[owner]||'bar-b';
        let txt=isStart&&isEnd?(isWedRow?'🎊':'●'):isStart?'▶':isEnd?'◀':'─';
        let extraCls=isCurCol?' col-today':isWedCol?' col-wed':'';
        cells+=`<td class="g-bar ${bcls}${extraCls}">${txt}</td>`;
      } else {
        let extraCls=isCurCol?' col-today':isWedCol?' col-wed':isPast?' col-past':'';
        cells+=`<td class="g-bar${extraCls}"></td>`;
      }
    });
    html+=`<tr>${catCell}<td class="g-task">${task}</td><td><span class="g-own ${ownCls}">${ownLbl}</span></td>${cells}</tr>`;
  });
  document.getElementById('g-body').innerHTML=html;
}

      item.fixedDate?(()=>{const[y,m,d]=item.fixedDate.split('-').map(Number);return new Date(y,m-1,d);})():null;
    const today=new Date();today.setHours(0,0,0,0);

    if(item.cat!==prevCat){
      if(prevCat) html+='</div>';

      html+=`<div class="cl-sec-hdr" style="background:${c}" onclick="toggleSec(this)"><span>${item.cat}</span><span>▼</span></div><div class="cl-sec-body">`;
      prevCat=item.cat;
    }
    const rowCls=`cl-item ${isDone?'is-done':''} ${stVal==='over'?'is-overdue':stVal==='soon'?'is-soon':''}`;
    html+=`<div class="${rowCls}" id="${key}">

      <div class="cl-body">

        <div class="cl-meta">
          ${stBadge}
          ${dlStr?`<span class="dl-text ${stVal==='over'?'dl-over':stVal==='soon'?'dl-soon':''}">📅 ${dlStr}</span>`:''}
          ${item.budget?`<span class="budget-tag">💰 ${item.budget}</span>`:''}
        </div>
        ${item.note?`<div class="cl-note">${item.note}</div>`:''}
      </div>
    </div>`;
  });
  if(prevCat) html+='</div>';
  container.innerHTML=html;
}

function toggleSpec(key,containerId,prefix,i){
  st[key]=!st[key];
  saveState();
  renderSpecific(containerId,prefix==='ml'?MALE:FEMALE,prefix);
}

// ═══════════════════════════════════════════════
// TAB SWITCH
// ═══════════════════════════════════════════════
function switchTab(name,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='gantt') renderGantt();
  if(name==='timeline') renderTimeline();
}

// WEDDING DATE CHANGE
// ═══════════════════════════════════════════════
document.getElementById('wedding-input').addEventListener('change',()=>{
  updateSettingsBar();
  renderCL();
  renderGantt();
  renderTimeline();
  renderSpecific('male-body',MALE,'ml');
  renderSpecific('female-body',FEMALE,'fe');
});

updateSettingsBar();
renderCL();
renderGantt();
renderTimeline();
renderSpecific('male-body',MALE,'ml');
renderSpecific('female-body',FEMALE,'fe');
</script>
